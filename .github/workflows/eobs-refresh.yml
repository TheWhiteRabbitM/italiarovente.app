name: eobs-refresh

# Aggiorna src/data/eobs.json (cross-check E-OBS da Copernicus CDS, indipendente
# dall'ERA5 usato dalla build principale). Girato separatamente dalla build
# Vercel perché:
#  - E-OBS non ha bisogno di freschezza giornaliera (nuove versioni escono
#    periodicamente, non ogni giorno) -> schedulazione mensile, non daily cron;
#  - la latenza dei job CDS è imprevedibile (minuti fino a oltre 20 ore in caso
#    di congestione), incompatibile con una build live su Vercel.
#
# NOTA: ECA&D (eca@knmi.nl) ha confermato via email il 2026-07-03 che l'uso
# descritto (validare le nostre analisi ERA5, pubblicare solo aggregati
# derivati con attribuzione) rientra nell'uso non commerciale consentito dalla
# licenza E-OBS — vedi il commento in testa a scripts/fetch-cds.mjs per le
# condizioni esatte. EOBS_LICENSE_CONFIRMED=1 è quindi impostata sotto come
# opt-in esplicito e permanente (non un secret: non è un dato sensibile, è
# solo un interruttore deliberato contro esecuzioni accidentali).

on:
  schedule:
    - cron: "0 4 1 * *" # 04:00 UTC, il 1° di ogni mese
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-eobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Fetch E-OBS from Copernicus CDS
        env:
          CDS_API_KEY: ${{ secrets.CDS_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          EOBS_LICENSE_CONFIRMED: "1"
        run: node scripts/fetch-cds.mjs

      - name: Commit updated eobs.json if changed
        run: |
          if git diff --quiet -- src/data/eobs.json; then
            echo "Nessuna modifica a src/data/eobs.json — niente da committare."
            exit 0
          fi
          git config user.name "italiarovente-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/eobs.json
          git commit -m "chore(eobs): refresh E-OBS cross-check snapshot [skip ci]"
          git push
